name: Update paper monitor

on:
  schedule:
    - cron: "18 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect papers
        run: python scripts/collect.py --days 45

      - name: Check translation configuration
        run: |
          if [ -n "$BAIDU_TRANSLATE_APP_ID" ] && [ -n "$BAIDU_TRANSLATE_SECRET_KEY" ]; then
            echo "Baidu Translate secrets are configured."
          else
            echo "Baidu Translate secrets are not configured. Chinese translation will be skipped."
          fi
        env:
          BAIDU_TRANSLATE_APP_ID: ${{ secrets.BAIDU_TRANSLATE_APP_ID }}
          BAIDU_TRANSLATE_SECRET_KEY: ${{ secrets.BAIDU_TRANSLATE_SECRET_KEY }}

      - name: Translate metadata to Chinese
        env:
          BAIDU_TRANSLATE_APP_ID: ${{ secrets.BAIDU_TRANSLATE_APP_ID }}
          BAIDU_TRANSLATE_SECRET_KEY: ${{ secrets.BAIDU_TRANSLATE_SECRET_KEY }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          DEEPL_API_URL: ${{ secrets.DEEPL_API_URL }}
          LIBRETRANSLATE_URL: ${{ secrets.LIBRETRANSLATE_URL }}
          LIBRETRANSLATE_API_KEY: ${{ secrets.LIBRETRANSLATE_API_KEY }}
        run: python scripts/translate_zh.py --require-backend

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update paper metadata"
          file_pattern: data/papers.json

  deploy-pages:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
