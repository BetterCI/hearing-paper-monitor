name: Update paper monitor

on:
  push:
    branches:
      - main
  schedule:
    - cron: "18 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

  update-data:
    needs: test
    if: github.event_name != 'push' && needs.test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect papers
        run: python scripts/collect.py --days 45

      - name: Enrich media metadata
        run: python scripts/enrich_media.py --limit 80

      - name: Check translation configuration
        run: |
          if [ -n "$BAIDU_TRANSLATE_APP_ID" ] && [ -n "$BAIDU_TRANSLATE_SECRET_KEY" ]; then
            echo "Baidu Translate secrets are configured."
          else
            echo "Baidu Translate secrets are not configured. Chinese translation will be skipped."
          fi
        env:
          BAIDU_TRANSLATE_APP_ID: ${{ secrets.BAIDU_TRANSLATE_APP_ID }}
          BAIDU_TRANSLATE_SECRET_KEY: ${{ secrets.BAIDU_TRANSLATE_SECRET_KEY }}

      - name: Translate metadata to Chinese
        continue-on-error: true
        env:
          BAIDU_TRANSLATE_APP_ID: ${{ secrets.BAIDU_TRANSLATE_APP_ID }}
          BAIDU_TRANSLATE_SECRET_KEY: ${{ secrets.BAIDU_TRANSLATE_SECRET_KEY }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          DEEPL_API_URL: ${{ secrets.DEEPL_API_URL }}
          LIBRETRANSLATE_URL: ${{ secrets.LIBRETRANSLATE_URL }}
          LIBRETRANSLATE_API_KEY: ${{ secrets.LIBRETRANSLATE_API_KEY }}
        run: python scripts/translate_zh.py

      - name: Analyze abstracts with MiniMax
        continue-on-error: true
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_API_BASE: ${{ secrets.MINIMAX_API_BASE }}
          MINIMAX_MODEL: ${{ secrets.MINIMAX_MODEL }}
          MINIMAX_ANALYSIS_LANGUAGE: ${{ vars.MINIMAX_ANALYSIS_LANGUAGE }}
        run: python scripts/analyze_with_minimax.py --limit 40

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update paper metadata"
          file_pattern: data/papers.json

  deploy-pages:
    needs:
      - test
      - update-data
    if: ${{ always() && needs.test.result == 'success' && (github.event_name == 'push' || needs.update-data.result == 'success') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
