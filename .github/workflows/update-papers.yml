name: Update paper monitor

on:
  push:
    branches:
      - main
  schedule:
    - cron: "18 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: update-paper-monitor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

  update-data:
    needs: test
    if: github.event_name != 'push' && needs.test.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect papers
        timeout-minutes: 10
        run: python scripts/collect.py --days 45

      - name: Backfill missing abstracts
        continue-on-error: true
        timeout-minutes: 3
        run: python scripts/backfill_abstracts.py --limit 25

      - name: Enrich OA and PubMed full-text figures
        timeout-minutes: 5
        run: python scripts/enrich_media.py --open-access-only --limit 25

      - name: Enrich last-author lab homepages
        continue-on-error: true
        timeout-minutes: 3
        run: python scripts/enrich_labs.py --days 14 --limit 8

      - name: Analyze abstracts with MiniMax
        continue-on-error: true
        timeout-minutes: 10
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_API_BASE: ${{ secrets.MINIMAX_API_BASE }}
          MINIMAX_MODEL: ${{ secrets.MINIMAX_MODEL }}
          MINIMAX_ANALYSIS_LANGUAGE: ${{ vars.MINIMAX_ANALYSIS_LANGUAGE }}
        run: python scripts/analyze_with_minimax.py --limit 10

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update paper metadata"
          file_pattern: data/papers.json

  deploy-pages:
    needs:
      - test
      - update-data
    if: ${{ always() && needs.test.result == 'success' && (github.event_name == 'push' || needs.update-data.result == 'success') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
